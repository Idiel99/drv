<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>DRV Development LLC — Building South Florida's future</title>
  <meta name="description" content="Family-run, licensed Florida general contractor. New construction, custom homes, commercial build-outs, remodels, and design-build across Miami-Dade, Broward, and Palm Beach. CGC1538931." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap" />

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    :root {
      --ink: #0A1628;
      --ink-2: #0d1a2e;
      --charcoal: #1F2937;
      --steel: #4B5563;
      --silver: #9CA3AF;
      --mist: #F8FAFC;
      --accent: #3B82F6;
      --display-font: "Inter Tight", system-ui;
      --body-font: "Inter", system-ui;
    }
    html { scroll-behavior: smooth; }
    body {
      font-family: var(--body-font);
      background: var(--ink);
      color: var(--mist);
      -webkit-font-smoothing: antialiased;
      font-feature-settings: "ss01", "cv11";
    }
    .font-display { font-family: var(--display-font); letter-spacing: -0.02em; }
    .font-mono { font-family: "JetBrains Mono", ui-monospace, monospace; }

    /* Selection */
    ::selection { background: var(--accent); color: white; }

    /* Form */
    .contact-input {
      width: 100%;
      background: transparent;
      border: none;
      color: var(--mist);
      font-size: 17px;
      padding: 6px 0;
      outline: none;
      font-family: var(--body-font);
    }
    .contact-input::placeholder { color: rgba(156, 163, 175, 0.5); }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 8px; background: var(--ink); }
    ::-webkit-scrollbar-thumb { background: rgba(156,163,175,0.2); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(156,163,175,0.4); }

    /* Reveal-up — visible by default; animation plays on mount as enhancement (graceful in throttled tabs) */
    .reveal-up { animation: revealUp 0.9s cubic-bezier(0.22, 1, 0.36, 1); animation-delay: var(--reveal-delay, 0s); }
    @keyframes revealUp {
      0%   { opacity: 0; transform: translateY(var(--reveal-y, 24px)); }
      0.1% { opacity: 0; transform: translateY(var(--reveal-y, 24px)); }
      100% { opacity: 1; transform: translateY(0); }
    }
    /* Hero headline reveal — animates if the browser is foregrounded,
       and remains at its natural visible state otherwise (graceful degradation). */
    .split-line {
      display: block;
      animation: splitUp 1.05s cubic-bezier(0.22, 1, 0.36, 1);
    }
    @keyframes splitUp {
      from { transform: translateY(110%); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    /* Reduced motion */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }

    /* Subtle architectural noise overlay */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.6 0 0 0 0 0.65 0 0 0 0 0.75 0 0 0 0.06 0'/></filter><rect width='200' height='200' filter='url(%23n)'/></svg>");
      pointer-events: none;
      z-index: 1;
      opacity: 0.5;
      mix-blend-mode: overlay;
    }
    #root { position: relative; z-index: 2; }

    /* Loader */
    .drv-loader {
      position: fixed; inset: 0; background: var(--ink); z-index: 999;
      display: flex; align-items: center; justify-content: center;
      transition: opacity 0.6s ease;
    }
    .drv-loader.hide { opacity: 0; pointer-events: none; }
    .drv-loader .mark {
      font-family: "Inter Tight"; font-weight: 700; letter-spacing: -0.04em;
      font-size: 64px; color: var(--mist); position: relative;
    }
    .drv-loader .mark::after {
      content: ""; position: absolute; left: 0; right: 0; bottom: -8px; height: 1px;
      background: var(--accent); transform-origin: left; animation: load 1.4s ease-out forwards;
    }
    @keyframes load { from { transform: scaleX(0); } to { transform: scaleX(1); } }
  </style>
</head>
<body>
  <div class="drv-loader" id="drvLoader">
    <div class="mark">DRV</div>
  </div>

  <div id="root"></div>

  <!-- React -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- Framer Motion + Three.js -->
  <script src="https://unpkg.com/framer-motion@11.0.8/dist/framer-motion.js"></script>
  <script src="https://unpkg.com/three@0.158.0/build/three.min.js"></script>
  <script>
    // Alias framer-motion global (it ships as window.Motion in UMD)
    window.framerMotion = window.Motion || window.framerMotion;
    window.THREE = window.THREE || (window.Three && window.Three.THREE);
  </script>

  <!-- Data + scene -->
  <script src="copy.js"></script>
  <script src="hero-scene.js"></script>

  <!-- React components -->
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="ui.jsx"></script>
  <script type="text/babel" src="sections-hero.jsx"></script>
  <script type="text/babel" src="sections-mid.jsx"></script>
  <script type="text/babel" src="sections-end.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>

  <script>
    window.addEventListener("load", () => {
      setTimeout(() => {
        const l = document.getElementById("drvLoader");
        if (l) { l.classList.add("hide"); setTimeout(() => l.remove(), 700); }
      }, 600);
    });
  </script>
</body>
</html>
